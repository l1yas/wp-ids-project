<!DOCTYPE html>
<html>
<head>
    <title> IDS Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <h1>IDS DASHBOARD</h1>
    <table>
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Type</th>
                <th>IP</th>
                <th>User</th>
                <th>Subtype</th>
            </tr>
        </thead>
        <tbody id="logs"></tbody>
    </table>

<script>
    async function fetch_logs() {
        const res = await fetch("/events");
        const data = await res.json();

        let html = "";
        data.reverse().forEach(e => {
            html += `
        <tr>
            <td>${e.timestamp || ""}</td>
            <td>${e.type || ""}</td>
            <td>${e.ip || ""}</td>
            <td>${e.username || ""}</td>
            <td>${e.subtype || ""}</td>
        </tr>`;
        });

        document.getElementById("logs").innerHTML = html;
    }

setInterval(fetch_logs, 2000);
fetch_logs()
</script>
</body>
</html>
